specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Helicone
providerId: helicone
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - AI Gateways
  - AI Monitoring
  - Gateways
  - LLM Observability
  - LLM Routing
  - Prompt Management
description: Helicone uses tiered subscription pricing for its LLM observability and AI gateway platform. Each
  paid tier includes 10,000 logged requests and 1 GB of storage; usage above that is billed via a usage-based
  add-on (per the published pricing calculator). Tiers escalate seats, organizations, log-ingestion rate, API
  call rate, retention, and compliance features. Enterprise pricing is custom.
sources:
  - https://helicone.ai/pricing
  - https://docs.helicone.ai/getting-started/integration-method/gateway
plans:
  - id: helicone-hobby
    name: Hobby
    type: freemium
    description: Free tier intended for evaluation and personal projects. Includes 10,000 requests/month,
      1 GB storage, 7-day retention, 1 seat, and 1 organization.
    entries:
      - label: Included Requests
        description: Monthly logged-request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 10000
        timeFrame: month
        geo: global
        domains:
          - https://ai-gateway.helicone.ai
          - https://api.helicone.ai
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Included Storage
        description: Storage included in the Hobby tier
        name: storage
        type: quota
        metric: gb
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://api.helicone.ai
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Log Ingestion Rate
        description: Sustained log ingestion rate
        name: ingestion_rate
        type: rate
        metric: logs_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://api.helicone.ai
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: API Call Rate
        description: Sustained API call rate against Helicone APIs
        name: api_call_rate
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://api.helicone.ai
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 7-Day Data Retention
      - name: 1 Seat
      - name: 1 Organization
      - name: Public Documentation
      - name: Community Support
      - name: Helicone AI Gateway API
      - name: Helicone Request API
      - name: Helicone Prompt API
      - name: Helicone Experiment API
      - name: Helicone Evals API
      - name: Helicone Session API
      - name: Helicone User API
  - id: helicone-pro
    name: Pro
    type: subscription
    description: Production tier at $79/month. Includes 10,000 requests and 1 GB storage; overages are billed
      usage-based via the published pricing calculator. Adds unlimited seats, alerts, reports, and HQL query
      language.
    entries:
      - label: Subscription Fee
        description: Monthly subscription price for the Pro tier
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://api.helicone.ai
        unit: 1
        price: '$79 per month'
        userMultiplied: false
      - label: Included Requests
        description: Monthly logged-request quota included with Pro
        name: api_requests
        type: quota
        metric: requests
        limit: 10000
        timeFrame: month
        geo: global
        domains:
          - https://ai-gateway.helicone.ai
          - https://api.helicone.ai
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Included Storage
        description: Storage included in the Pro tier
        name: storage
        type: quota
        metric: gb
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://api.helicone.ai
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Request Overage
        description: Per-request charge once the included 10,000 monthly requests are exhausted
        name: request_overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://ai-gateway.helicone.ai
          - https://api.helicone.ai
        unit: 1
        price: 'see helicone.ai/pricing calculator'
        userMultiplied: false
      - label: Storage Overage
        description: Storage above 1 GB billed via the pricing calculator
        name: storage_overage
        type: metered
        metric: gb
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://api.helicone.ai
        unit: 1
        price: 'see helicone.ai/pricing calculator'
        userMultiplied: false
      - label: Log Ingestion Rate
        description: Sustained log ingestion rate on Pro
        name: ingestion_rate
        type: rate
        metric: logs_per_minute
        limit: 1000
        timeFrame: minute
        geo: global
        domains:
          - https://api.helicone.ai
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: API Call Rate
        description: Sustained API call rate on Pro
        name: api_call_rate
        type: rate
        metric: requests_per_minute
        limit: 60
        timeFrame: minute
        geo: global
        domains:
          - https://api.helicone.ai
        unit: 1
