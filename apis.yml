    description: >-
      Helicone is an open-source LLM observability platform and AI gateway.
      The worlds fastest-growing AI companies rely on Helicone to route, debug,
      and analyze their applications. With one line of code, developers can
      monitor, evaluate, and experiment across 100+ AI models from providers
      including OpenAI, Anthropic, Google, and more. The platform provides
      unified request logging, cost tracking, latency analysis, prompt
      management, experiments, evaluations, sessions tracing, caching, rate
      limiting, and webhooks. Helicone is SOC 2 and GDPR compliant with a
      generous free tier of 10,000 requests per month.
  - aid: helicone:ai-gateway-api
    name: Helicone AI Gateway API
    tags:
      - AI Gateways
      - LLM Routing
      - Chat Completions
      - AI Models
    humanURL: https://docs.helicone.ai/gateway/overview
    baseURL: https://ai-gateway.helicone.ai
    properties:
      - url: https://docs.helicone.ai/gateway/overview
        type: Documentation
      - url: https://docs.helicone.ai/ai-gateway.openapi.json
        type: OpenAPI
      - url: https://docs.helicone.ai/rest/ai-gateway/post-v1-chat-completions
        type: APIReference
      - url: https://docs.helicone.ai/getting-started/quick-start
        type: GettingStarted
      - url: https://docs.helicone.ai/gateway/provider-routing
        type: ProviderRouting
      - url: https://www.helicone.ai/models
        type: Models
    description: >-
      The Helicone AI Gateway API provides OpenAI-compatible endpoints for
      routing requests to 100+ AI models across providers including OpenAI,
      Anthropic, Google, Groq, and more. It offers a unified API with
      automatic provider fallbacks, zero markup pricing, built-in
      observability, intelligent routing, prompt caching, error handling,
      and image generation support.
  - aid: helicone:request-api
    name: Helicone Request API
    tags:
      - Requests
      - LLM Observability
      - Analytics
    humanURL: https://docs.helicone.ai/rest/request/post-v1requestquery
    baseURL: https://api.helicone.ai
    properties:
      - url: https://docs.helicone.ai/rest/request/post-v1requestquery
        type: Documentation
      - url: https://docs.helicone.ai/swagger.json
        type: OpenAPI
    description: >-
      The Helicone Request API allows developers to query, retrieve, and
      manage LLM request data. Endpoints include querying requests with
      filters, retrieving requests by IDs, submitting feedback and scores,
      uploading request assets, and updating request properties.
  - aid: helicone:prompt-api
    name: Helicone Prompt API
    tags:
