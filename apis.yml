      - url: https://docs.helicone.ai/features/advanced-usage/scores
        type: Overview
      - url: https://docs.helicone.ai/swagger.json
        type: OpenAPI
    description: >-
      The Helicone Evals API provides endpoints for creating evaluations,
      querying evaluation results, retrieving scores, and analyzing score
      distributions. It enables developers to systematically assess and
      monitor the quality of their AI model outputs.
  - aid: helicone:session-api
    name: Helicone Session API
    tags:
      - Sessions
