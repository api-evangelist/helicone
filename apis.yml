      - url: https://docs.helicone.ai/rest/experiment/post-v1experiment-evaluatorsrun
        type: APIReference
      - url: https://docs.helicone.ai/swagger.json
        type: OpenAPI
    description: >-
      The Helicone Experiment API enables developers to create experiment
      datasets, run evaluators, update experiment metadata, and manage
      experiment workflows. It supports systematic prompt experimentation
      and evaluation to optimize AI application performance.
  - aid: helicone:evals-api
    name: Helicone Evals API
    tags:
