naftiko: 1.0.0-alpha2
info:
  label: helicone-api — Models
  description: 'helicone-api — Models. 2 operations. Lead operation: Models. Self-contained Naftiko capability covering one
    Helicone business surface.'
  tags:
  - Helicone
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HELICONE_API_KEY: HELICONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: helicone-models
    baseUri: https://api.helicone.ai
    description: helicone-api — Models business capability. Self-contained, no shared references.
    resources:
    - name: v1-models
      path: /v1/models
      operations:
      - name: getmodels
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-models-multimodal
      path: /v1/models/multimodal
      operations:
      - name: getmultimodalmodels
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.HELICONE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: helicone-models-rest
    port: 8080
    description: REST adapter for helicone-api — Models. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/models
      name: v1-models
      description: REST surface for v1-models.
      operations:
      - method: GET
        name: getmodels
        description: getmodels
        call: helicone-models.getmodels
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/models/multimodal
      name: v1-models-multimodal
      description: REST surface for v1-models-multimodal.
      operations:
      - method: GET
        name: getmultimodalmodels
        description: getmultimodalmodels
        call: helicone-models.getmultimodalmodels
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: helicone-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for helicone-api — Models. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: getmodels
      description: getmodels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: helicone-models.getmodels
      outputParameters:
      - type: object
        mapping: $.
    - name: getmultimodalmodels
      description: getmultimodalmodels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: helicone-models.getmultimodalmodels
      outputParameters:
      - type: object
        mapping: $.
