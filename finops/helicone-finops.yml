  BillingCurrency: USD
  ChargeCategory: Usage
principles:
  - name: Visibility
    description: Use the Helicone dashboard, request and session APIs, and HQL queries (Pro and above) to
      surface per-application LLM cost, latency, and token consumption in near real-time.
  - name: Allocation
    description: Tag each gateway call with custom properties (Helicone Property API) - e.g. team, environment,
      feature, customer-id - so cost can be attributed via the Property and User APIs.
  - name: Optimization
    description: Helicone-specific levers include caching, prompt versioning, model routing through the AI
      Gateway, retry/timeout tuning, and using the Evals API to compare cheaper models for the same quality.
  - name: Accountability
    description: Set per-organization budgets, configure alerts and reports (Pro and above), and use the
      dedicated Slack channel on Team and above to escalate spend anomalies.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
meters:
  - name: subscription_fee
    description: Flat monthly subscription fee for the active Helicone tier (Pro $79, Team $799, Enterprise
      custom)
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - organization
  - name: logged_requests
    description: Count of LLM requests logged through the AI Gateway or Request API
    unit: request
    aggregation: sum
    dimensions:
      - tier
      - organization
      - model
      - provider
      - consumer
  - name: request_overage
    description: Logged requests above the 10,000-per-month included quota, billed via the published
      pricing calculator
    unit: request
    aggregation: sum
    dimensions:
      - tier
      - organization
  - name: storage_used
    description: Stored payloads and trace data
    unit: GB
    aggregation: max
    dimensions:
      - tier
      - organization
      - retention_window
  - name: storage_overage
    description: Storage above the 1 GB included allotment, billed via the pricing calculator
    unit: GB
    aggregation: max
    dimensions:
      - tier
      - organization
  - name: seats
    description: Active seats per organization (Pro and above are unlimited; Hobby is 1)
    unit: seat
    aggregation: max
    dimensions:
      - tier
      - organization
  - name: organizations
    description: Number of organizations under the account (Hobby/Pro 1, Team 5, Enterprise unlimited)
    unit: organization
    aggregation: max
    dimensions:
      - tier
