  /v1/prompt-2025/update:
    post:
      operationId: UpdatePrompt2025
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result__id-string_.string_'
      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                promptBody:
                  $ref: '#/components/schemas/OpenAIChatRequest'
                commitMessage:
                  type: string
                environment:
                  type: string
                newMajorVersion:
                  type: boolean
                promptVersionId:
                  type: string
                promptId:
                  type: string
              required:
              - promptBody
              - commitMessage
              - newMajorVersion
              - promptVersionId
              - promptId
              type: object
  /v1/prompt-2025/update/environment:
    post:
      operationId: SetPromptVersionEnvironment
      responses:
        '200':
          description: Ok
          content:
