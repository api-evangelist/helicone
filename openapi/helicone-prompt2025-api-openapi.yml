      security:
      - api_key: []
      parameters:
      - in: path
        name: promptId
        required: true
        schema:
          type: string
      - in: path
        name: versionId
        required: true
        schema:
          type: string
  /v1/prompt-2025/id/{promptId}/{versionId}/inputs:
    get:
      operationId: GetPrompt2025Inputs
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_Prompt2025Input.string_'
      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters:
      - in: path
        name: promptId
        required: true
        schema:
          type: string
      - in: path
        name: versionId
        required: true
        schema:
          type: string
      - in: query
        name: requestId
        required: true
        schema:
          type: string
  /v1/prompt-2025/tags:
    get:
      operationId: GetPrompt2025Tags
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
