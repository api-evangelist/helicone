  /v1/prompt-2025/remove/environment:
    post:
      operationId: RemoveEnvironmentFromVersion
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_null.string_'
      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                environment:
                  type: string
                promptVersionId:
                  type: string
                promptId:
                  type: string
              required:
              - environment
              - promptVersionId
              - promptId
              type: object
  /v1/prompt-2025/count:
    get:
      operationId: GetPrompt2025Count
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_number.string_'
      tags:
