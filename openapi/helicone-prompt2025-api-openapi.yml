      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters:
      - in: path
        name: promptId
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                tags:
                  items:
                    type: string
                  type: array
              required:
              - tags
              type: object
  /v1/prompt-2025/{promptId}:
    delete:
      operationId: DeletePrompt2025
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_null.string_'
      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters:
      - in: path
        name: promptId
        required: true
        schema:
          type: string
  /v1/prompt-2025/{promptId}/{versionId}:
