      security:
      - api_key: []
      parameters: []
  /v1/prompt-2025:
    post:
      operationId: CreatePrompt2025
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_PromptCreateResponse.string_'
      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                promptBody:
                  $ref: '#/components/schemas/OpenAIChatRequest'
                tags:
                  items:
                    type: string
                  type: array
                name:
                  type: string
              required:
