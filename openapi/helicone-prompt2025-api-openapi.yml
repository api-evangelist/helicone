      security:
      - api_key: []
      parameters: []
  /v1/prompt-2025/query:
    post:
      operationId: GetPrompts2025
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_Prompt2025-Array.string_'
      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                pageSize:
                  type: number
                  format: double
                page:
                  type: number
                  format: double
                tagsFilter:
                  items:
                    type: string
                  type: array
                search:
                  type: string
              required:
              - pageSize
              - page
              - tagsFilter
              - search
              type: object
  /v1/prompt-2025/query/version:
    post:
      operationId: GetPrompt2025Version
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_Prompt2025Version.string_'
      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                promptVersionId:
                  type: string
              required:
              - promptVersionId
              type: object
  /v1/prompt-2025/query/environment-version:
    post:
      operationId: GetPrompt2025EnvironmentVersion
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_Prompt2025Version.string_'
      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                environment:
                  type: string
                promptId:
                  type: string
              required:
