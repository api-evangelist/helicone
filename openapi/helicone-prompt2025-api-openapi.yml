        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_Prompt2025Version_91_prompt_body_93_.string_'
      description: Get the full prompt body (messages, tools, etc.) for a specific prompt version.
      tags:
      - Prompt2025
      security:
      - api_key: []
      parameters:
      - in: path
        name: promptVersionId
        required: true
        schema:
          type: string
components:
  schemas:
    Result__id-string_.string_:
      anyOf:
      - $ref: '#/components/schemas/ResultSuccess__id-string__'
      - $ref: '#/components/schemas/ResultError_string_'
    OpenAIChatRequest:
      description: Simplified interface for the OpenAI Chat request format
      properties:
        model:
          type: string
        messages:
          items:
            properties:
              tool_calls:
                items:
                  properties:
                    type:
                      type: string
                      enum:
                      - function
                      nullable: false
                    function:
                      properties:
                        arguments:
                          type: string
                        name:
                          type: string
                      required:
                      - arguments
                      - name
                      type: object
                    id:
                      type: string
                  required:
                  - type
                  - function
                  - id
                  type: object
                type: array
              tool_call_id:
                type: string
              name:
                type: string
              content:
                anyOf:
                - type: string
                - items:
                    properties:
                      image_url:
                        properties:
                          url:
                            type: string
                        required:
                        - url
                        type: object
                      text:
                        type: string
                      type:
                        type: string
                    required:
                    - type
                    type: object
                  type: array
                nullable: true
              role:
                type: string
            required:
            - content
            - role
            type: object
          type: array
        temperature:
          type: number
          format: double
        top_p:
          type: number
          format: double
        max_tokens:
          type: number
          format: double
        max_completion_tokens:
          type: number
          format: double
        stream:
          type: boolean
        stop:
          anyOf:
          - items:
              type: string
            type: array
          - type: string
        tools:
          items:
            properties:
              function:
                properties:
                  strict:
                    type: boolean
                  parameters:
                    $ref: '#/components/schemas/Record_string.any_'
                  description:
                    type: string
                  name:
                    type: string
                required:
                - name
                type: object
              type:
                type: string
                enum:
                - function
                nullable: false
            required:
            - function
            - type
            type: object
          type: array
        tool_choice:
          anyOf:
          - properties:
              function:
                properties:
                  name:
                    type: string
                  type:
                    type: string
                    enum:
                    - function
                    nullable: false
                required:
                - name
                - type
                type: object
              type:
                type: string
            required:
            - type
            type: object
          - type: string
            enum:
            - none
            - auto
            - required
        parallel_tool_calls:
          type: boolean
        reasoning_effort:
          type: string
          enum:
          - minimal
          - low
          - medium
          - high
        verbosity:
          type: string
          enum:
          - low
          - medium
          - high
        frequency_penalty:
          type: number
          format: double
        presence_penalty:
          type: number
          format: double
        logit_bias:
          $ref: '#/components/schemas/Record_string.number_'
        logprobs:
          type: boolean
        top_logprobs:
          type: number
          format: double
        n:
          type: number
          format: double
        modalities:
          items:
            type: string
          type: array
        prediction: {}
        audio: {}
        response_format:
          properties:
            json_schema: {}
            type:
              type: string
          required:
          - type
          type: object
        seed:
          type: number
          format: double
        service_tier:
          type: string
        store:
          type: boolean
        stream_options: {}
        metadata:
          $ref: '#/components/schemas/Record_string.string_'
        user:
          type: string
        function_call:
          anyOf:
          - type: string
          - properties:
              name:
                type: string
            required:
            - name
            type: object
        functions:
          items: {}
          type: array
      type: object
      additionalProperties: false
    Result_string-Array.string_:
      anyOf:
      - $ref: '#/components/schemas/ResultSuccess_string-Array_'
      - $ref: '#/components/schemas/ResultError_string_'
    Record_string.unknown_:
      properties: {}
      additionalProperties: {}
      type: object
      description: Construct a type with a set of properties K of type T
    ResultSuccess_Prompt2025Version_:
      properties:
        data:
          $ref: '#/components/schemas/Prompt2025Version'
        error:
          type: number
          enum:
          - null
          nullable: true
      required:
      - data
      - error
      type: object
      additionalProperties: false
    PromptCreateResponse:
      properties:
        id:
          type: string
        versionId:
          type: string
      required:
      - id
      - versionId
      type: object
      additionalProperties: false
    Result_PromptCreateResponse.string_:
      anyOf:
      - $ref: '#/components/schemas/ResultSuccess_PromptCreateResponse_'
      - $ref: '#/components/schemas/ResultError_string_'
    Prompt2025:
      properties:
        id:
          type: string
        name:
          type: string
        tags:
          items:
            type: string
          type: array
        created_at:
          type: string
      required:
      - id
      - name
      - tags
      - created_at
      type: object
      additionalProperties: false
    Result_PromptVersionCounts.string_:
      anyOf:
      - $ref: '#/components/schemas/ResultSuccess_PromptVersionCounts_'
      - $ref: '#/components/schemas/ResultError_string_'
    ResultSuccess_Prompt2025_:
      properties:
        data:
          $ref: '#/components/schemas/Prompt2025'
        error:
          type: number
          enum:
          - null
          nullable: true
      required:
      - data
      - error
      type: object
      additionalProperties: false
    Record_string.any_:
      properties: {}
      additionalProperties: {}
      type: object
      description: Construct a type with a set of properties K of type T
    Result_Prompt2025Version_91_prompt_body_93_.string_:
      anyOf:
      - $ref: '#/components/schemas/ResultSuccess_Prompt2025Version_91_prompt_body_93__'
      - $ref: '#/components/schemas/ResultError_string_'
    Result_Prompt2025Input.string_:
      anyOf:
      - $ref: '#/components/schemas/ResultSuccess_Prompt2025Input_'
      - $ref: '#/components/schemas/ResultError_string_'
    Result_Prompt2025Version.string_:
      anyOf:
      - $ref: '#/components/schemas/ResultSuccess_Prompt2025Version_'
      - $ref: '#/components/schemas/ResultError_string_'
    Result_null.string_:
      anyOf:
      - $ref: '#/components/schemas/ResultSuccess_null_'
      - $ref: '#/components/schemas/ResultError_string_'
    ResultSuccess__id-string__:
      properties:
        data:
          properties:
            id:
              type: string
          required:
          - id
          type: object
        error:
          type: number
          enum:
          - null
          nullable: true
      required:
      - data
      - error
      type: object
      additionalProperties: false
    ResultSuccess_Prompt2025Version_91_prompt_body_93__:
      properties:
        data:
          $ref: '#/components/schemas/Prompt2025VersionPromptBody'
        error:
          type: number
          enum:
          - null
          nullable: true
      required:
      - data
      - error
      type: object
      additionalProperties: false
    Prompt2025Version:
      properties:
        id:
          type: string
        model:
          type: string
        prompt_id:
          type: string
        major_version:
          type: number
          format: double
        minor_version:
          type: number
          format: double
        commit_message:
          type: string
        environments:
          items:
            type: string
          type: array
        created_at:
          type: string
        s3_url:
          type: string
        prompt_body:
          $ref: '#/components/schemas/Prompt2025VersionPromptBody'
          description: 'The full prompt body including messages. Only included when explicitly requested

            via the `includePromptBody` parameter to avoid unnecessary data transfer.'
      required:
      - id
      - model
      - prompt_id
      - major_version
      - minor_version
      - commit_message
      - created_at
      type: object
      additionalProperties: false
    Result_Prompt2025Version-Array.string_:
      anyOf:
      - $ref: '#/components/schemas/ResultSuccess_Prompt2025Version-Array_'
      - $ref: '#/components/schemas/ResultError_string_'
    Prompt2025VersionPromptBody:
      properties:
        model:
          type: string
        messages:
          items:
            properties:
              tool_calls:
                items:
                  properties:
                    type:
                      type: string
                      enum:
                      - function
                      nullable: false
                    function:
                      properties:
                        arguments:
                          type: string
                        name:
                          type: string
                      required:
                      - arguments
                      - name
                      type: object
                    id:
                      type: string
                  required:
                  - type
                  - function
                  - id
                  type: object
                type: array
              tool_call_id:
                type: string
              name:
                type: string
              content:
                anyOf:
                - type: string
                - items:
                    properties:
                      image_url:
                        properties:
                          url:
                            type: string
                        required:
                        - url
                        type: object
                      text:
                        type: string
                      type:
                        type: string
                    required:
                    - type
                    type: object
                  type: array
                nullable: true
              role:
                type: string
            required:
            - content
            - role
            type: object
          type: array
        temperature:
          type: number
          format: double
        top_p:
          type: number
          format: double
        max_tokens:
          type: number
          format: double
        tools:
          items:
            properties:
              function:
                properties:
                  parameters:
                    $ref: '#/components/schemas/Record_string.unknown_'
                  description:
                    type: string
                  name:
                    type: string
                required:
                - parameters
                - description
                - name
                type: object
              type:
                type: string
                enum:
                - function
                nullable: false
            required:
            - function
            - type
            type: object
          type: array
        tool_choice:
          anyOf:
          - type: string
          - properties:
              function:
                properties:
                  name:
                    type: string
                  type:
                    type: string
                    enum:
                    - function
                    nullable: false
                required:
                - name
                - type
                type: object
              type:
                type: string
            required:
            - type
            type: object
      type: object
      additionalProperties: {}
    PromptVersionCounts:
      properties:
        totalVersions:
          type: number
          format: double
        majorVersions:
          type: number
          format: double
      required:
      - totalVersions
      - majorVersions
      type: object
      additionalProperties: false
    ResultSuccess_null_:
      properties:
        data:
          type: number
          enum:
          - null
          nullable: true
        error:
          type: number
          enum:
          - null
          nullable: true
      required:
      - data
      - error
      type: object
      additionalProperties: false
    ResultSuccess_Prompt2025Input_:
      properties:
        data:
          $ref: '#/components/schemas/Prompt2025Input'
        error:
          type: number
          enum:
          - null
          nullable: true
      required:
      - data
      - error
      type: object
      additionalProperties: false
    Record_string.number_:
      properties: {}
      additionalProperties:
        type: number
        format: double
      type: object
      description: Construct a type with a set of properties K of type T
    Prompt2025Input:
      properties:
        request_id:
          type: string
        version_id:
          type: string
        inputs:
          $ref: '#/components/schemas/Record_string.any_'
      required:
      - request_id
      - version_id
      - inputs
      type: object
      additionalProperties: false
    Record_string.string_:
      properties: {}
      additionalProperties:
        type: string
      type: object
      description: Construct a type with a set of properties K of type T
    ResultSuccess_Prompt2025-Array_:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Prompt2025'
          type: array
        error:
          type: number
          enum:
          - null
          nullable: true
      required:
      - data
      - error
      type: object
      additionalProperties: false
    ResultSuccess_string-Array_:
      properties:
        data:
          items:
            type: string
          type: array
        error:
          type: number
          enum:
          - null
          nullable: true
      required:
      - data
      - error
      type: object
      additionalProperties: false
