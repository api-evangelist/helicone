      - Request
      security:
      - api_key: []
      parameters:
      - in: path
        name: requestId
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                value:
                  type: string
                key:
                  type: string
              required:
              - value
              - key
              type: object
  /v1/request/{requestId}/assets/{assetId}:
