      - Request
      security:
      - api_key: []
      parameters:
      - in: path
        name: requestId
        required: true
        schema:
          type: string
      - in: path
        name: assetId
        required: true
        schema:
          type: string
  /v1/request/{requestId}/score:
    post:
      operationId: AddScores
      responses:
