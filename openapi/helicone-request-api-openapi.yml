        required: true
        schema:
          type: string
  /v1/request/query-ids:
    post:
      operationId: GetRequestsByIds
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_HeliconeRequest-Array.string_'
      tags:
      - Request
      security:
      - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
