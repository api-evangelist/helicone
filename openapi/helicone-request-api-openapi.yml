                    isCached: false
                    limit: 10
                    offset: 0
                    sort:
                      created_at: desc
                    isScored: false
                    isPartOfExperiment: false
      tags:
      - Request
      security:
      - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestQueryParams'
  /v1/request/{requestId}:
    get:
      operationId: GetRequestById
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result_HeliconeRequest.string_'
      tags:
      - Request
      security:
      - api_key: []
      parameters:
      - in: path
        name: requestId
        required: true
        schema:
          type: string
      - in: query
        name: includeBody
        required: false
        schema:
          default: false
          type: boolean
  /v1/request/{requestId}/inputs:
    get:
      operationId: GetRequestInputs
      responses:
        '200':
          description: Ok
