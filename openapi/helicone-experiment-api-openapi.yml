      - in: path
        name: experimentTableId
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                value:
                  type: string
                  nullable: true
                rowIndex:
                  type: number
                  format: double
                columnId:
                  type: string
              required:
              - value
              - rowIndex
              - columnId
              type: object
