                          - value
                          - columnId
                          type: object
                        type: array
                      datasetId:
                        type: string
                      inputs:
                        $ref: '#/components/schemas/Record_string.string_'
                      inputRecordId:
                        type: string
                    required:
                    - cells
                    - datasetId
                    - inputs
                    - inputRecordId
